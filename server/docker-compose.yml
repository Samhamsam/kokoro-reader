services:
  kokoro-server:
    image: ghcr.io/samhamsam/kokoro-reader/kokoro-server:latest
    ports:
      - "8787:8787"
    volumes:
      - kokoro-models:/app/models-tts
      - kokoro-data:/app/data
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    restart: unless-stopped

volumes:
  kokoro-models:
  kokoro-data:
